# Project-local Cargo config. See README “Developer Checks”.

[alias]
# Clippy directly — avoids rebuilding the qcheck wrapper bin on every run.
qcheck = "clippy --all-targets --all-features"

[build]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# clang + lld on Linux (mold is an alternative; this project uses lld).
[target.'cfg(target_os = "linux")']
linker = "clang"
