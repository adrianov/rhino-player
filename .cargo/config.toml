# Project-local Cargo aliases. See README “Code quality” and `.cursor/rules/complexity-and-module-design.mdc`.

[alias]
# Full crate Clippy run; respects clippy.toml and [lints] in Cargo.toml. Module length is policed
# by `.cursor/rules/refactor-touched-longest.mdc` and `clippy::too_many_lines` (300-line soft target).
qcheck = "run --quiet --bin qcheck --"
