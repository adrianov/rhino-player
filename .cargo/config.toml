# Project-local Cargo aliases. See README “Code quality” and `.cursor/rules/complexity-and-module-design.mdc`.

[alias]
# Full crate + tests; respects clippy.toml and [lints] in Cargo.toml, then enforces source module size.
qcheck = "run --quiet --bin qcheck --"
module-lines = "run --quiet --bin module-lines --"
